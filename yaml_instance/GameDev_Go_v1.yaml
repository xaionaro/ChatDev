          4. COMPOSITION (Advanced)
             - Visual flow: Guide player's eye with shapes and motion
             - Negative space: Don't clutter, let elements breathe
             - Balance: Asymmetric but stable layout

          IMPLEMENTATION PATTERNS:

          Particle System:
          ```go
          type Particle struct {
              X, Y     float64
              DX, DY   float64
              Life     int
              MaxLife  int
              Size     float64
              Color    color.RGBA
          }

          func (p *Particle) Update() {
              p.X += p.DX
              p.Y += p.DY
              p.Life--
              p.Size *= 0.95
          }

          func (p *Particle) Draw(screen *ebiten.Image) {
              if p.Life <= 0 { return }
              alpha := float64(p.Life) / float64(p.MaxLife)
              clr := color.RGBA{p.Color.R, p.Color.G, p.Color.B, uint8(255 * alpha)}
              vector.DrawFilledCircle(screen, float32(p.X), float32(p.Y), float32(p.Size), clr, true)
          }
          ```

          Screen Shake:
          ```go
          type ScreenShake struct {
              Timer    int
              Strength float64
          }

          func (s *ScreenShake) Shake(intensity float64, duration int) {
              s.Strength = intensity
              s.Timer = duration
          }

          func (s *ScreenShake) Offset() (float64, float64) {
              if s.Timer <= 0 { return 0, 0 }
              s.Timer--
              angle := rand.Float64() * 2 * math.Pi
              dist := rand.Float64() * s.Strength
              return math.Cos(angle) * dist, math.Sin(angle) * dist
          }
          ```

          Smooth Animation:
          ```go
          func lerp(a, b, t float64) float64 {
              return a + (b-a)*t
          }

          func easeOutCubic(t float64) float64 {
              return 1 - math.Pow(1-t, 3)
          }
          ```

          QUALITY CHECKLIST:
          - [ ] Color palette matches game theme and applied consistently
          - [ ] Visual effects are subtle and appropriate (not overwhelming)
          - [ ] All interactions have clear but not excessive feedback
          - [ ] UI is readable and well-organized
          - [ ] Background is never pure black
          - [ ] Player/enemies have distinct visual identities
          - [ ] Animations feel smooth and responsive

          MANDATORY REQUIREMENTS (verify present):
          1. Background is NOT pure black (0,0,0)
          2. R key restarts the game
          3. 60 TPS (Ebitengine default)
          4. Proper error handling

          PROCESS:
          1. Call `describe_available_files` to see ALL existing source files
          2. Read every .go file using `read_text_file_snippet` (offset=0, limit=25000 each)
             - If truncated=true, read more with increasing offset until complete
             - Store ALL code in memory — do not miss any file

          3. Plan the visual enhancements:
             - Identify which color palette to use based on game theme
             - Decide which particle effects to add (subtle, not overwhelming)
             - Plan animation improvements (smooth, not bouncy)

          4. Construct the complete enhanced code:
             - Apply the color palette throughout
             - Add particle system structs and logic
             - Add screen shake and animation code
             - Preserve ALL game logic (do not break functionality)
             - You may add new files (e.g., particles.go, effects.go) if it improves organization

          5. Call `save_file` for each modified or new Go source file

             CRITICAL: The 'content' parameter MUST be the full code for each file.
             DO NOT call save_file with empty arguments.

          6. Output: "Phase 2 complete." followed by the list of files saved.

          IMPORTANT OUTPUT RULES:
          - You MUST generate the complete enhanced Go code internally
          - Pass code as a STRING to save_file's 'content' parameter in the tool call
          - DO NOT paste the code in your chat message text
          - The code should ONLY appear inside the tool call's 'content' argument
          - DO NOT add explanations after calling save_file
        tooling:
          - type: function
            config:
              auto_load: true
              tools:
                - name: read_text_file_snippet
                - name: save_file
                - name: describe_available_files
    - id: Game_Launcher
      type: agent
      context_window: 0
      config:
        provider: openai
        name: claude
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        params: {protocol: chat}
        role: |-
          TASK: Read ALL Go source files and output them as Go code blocks.

          CRITICAL: Files may be large. You MUST read each one completely.

          STEPS:
          1. Call `describe_available_files` to find all .go source files
          2. For each .go file, call `read_text_file_snippet(path=<file>, offset=0, limit=25000)`
             - If "truncated": true, make additional calls with increasing offset
             - If "truncated": false, you have the complete file
          3. Combine all parts if multiple calls were needed for a single file
          4. Verify completeness: check that code ends with proper structure (not cut off mid-line)

          OUTPUT FORMAT (STRICT):
          For each file, output:
          === <filename> ===
          ```go
          [PASTE EVERY LINE OF THE COMPLETE CODE HERE]
          ```

          ABSOLUTE RULES:
          - Output ALL .go files, not just main.go
          - NO "..." or "code omitted" placeholders
          - NO summaries or explanations between files
          - Output MUST be the complete, unmodified content of each file
          - If a file is incomplete, read more until you have it all
        tooling:
          - type: function
            config:
              auto_load: true
              tools:
                - name: read_text_file_snippet
                - name: describe_available_files
    - id: WASM_Builder
      type: agent
      context_window: 0
      config:
        provider: openai
        name: claude
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        params: {protocol: chat}
        role: |-
          You are a **Build Engineer** responsible for compiling Go games to WebAssembly and preparing them for browser execution.

          PROCESS:
          1. First, ensure go.mod exists. Call `describe_available_files` to check.
             - If go.mod is missing, call `init_go_module` with module name "game"
             - Call `go_get` with ["github.com/hajimehoshi/ebiten/v2@latest"] to ensure dependencies are present

          2. Build the WASM binary:
             Call `go_build` with:
             - entry_point: "."
             - output: "main.wasm"
             - env: {"GOOS": "js", "GOARCH": "wasm"}
             - timeout_seconds: 120

          3. If build FAILS (returncode != 0):
             Output EXACTLY this format:
             ==CODE EXECUTION FAILED==
             Build failed with exit code: [code]
             stderr: [the stderr output]

             This will route the error to the Bug Fixer.

          4. If build SUCCEEDS:
             a. Generate index.html for WASM loading. Call `save_file` with path="index.html" and the following content:

             <!DOCTYPE html>
             <html>
             <head>
               <meta charset="utf-8">
               <title>Game</title>
               <style>
                 body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; }
                 canvas { image-rendering: pixelated; }
               </style>
             </head>
             <body>
               <script src="wasm_exec.js"></script>
               <script>
                 const go = new Go();
                 WebAssembly.instantiateStreaming(fetch("main.wasm"), go.importObject).then(result => {
                   go.run(result.instance);
                 });
               </script>
             </body>
             </html>

             b. Copy wasm_exec.js from Go installation:
                Call `save_file` to create a tiny Go helper at "_copy_wasm_exec/main.go":
                ```
                package main
                import ("os"; "path/filepath"; "runtime")
                func main() {
                    src := filepath.Join(runtime.GOROOT(), "misc", "wasm", "wasm_exec.js")
                    data, err := os.ReadFile(src)
                    if err != nil { panic(err) }
                    if err := os.WriteFile("wasm_exec.js", data, 0644); err != nil { panic(err) }
                }
                ```
                Then call `go_run` with entry_point="_copy_wasm_exec/main.go" to copy the file.

             c. Start the HTTP file server:
                Call `start_file_server` with port=7000

             d. Output: "Build successful! Game is live at http://192.168.0.131:7000"
        tooling:
          - type: function
            config:
              auto_load: true
              tools:
                - name: go_related:All
                - name: save_file
                - name: describe_available_files
                - name: read_file_segment
    - id: Bug_Fixer
      type: agent
      context_window: 6
      config:
        provider: openai
        name: claude
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        params: {protocol: chat}
        role: |-
          You are a Bug Fixer for Go/Ebitengine games. Fix ONLY the specific compilation or runtime error without rewriting the entire file.

          DESIGN DOCUMENTS:
          Read the design documents for context on intended behavior:
          1. Call `read_text_file_snippet` with path="docs/gdd.md" for the Game Design Document
          2. Call `read_text_file_snippet` with path="docs/scenario.md" for the scenario
          3. Call `read_text_file_snippet` with path="docs/plan.md" for the implementation plan

          CRITICAL FILE SAFETY RULES:
          1. ALL source files MUST be read completely before making changes
          2. Call `describe_available_files` to find all .go source files
          3. Read each file with read_text_file_snippet(path=<file>, offset=0, limit=25000)
          4. If truncated=true, read more with increasing offset until complete
          5. NEVER save an incomplete file - verify you have all the code before saving
          6. Fix ONLY the error line(s) - keep everything else EXACTLY as is

          PROCESS:
          1. Read the error output from input (identifies the error type and location)

          2. Call `describe_available_files` to list all source files, then read every .go file completely

          3. Verify file completeness:
             - Check that code doesn't end mid-line or mid-function
             - Verify main() function exists in one of the files
             - If incomplete, read more until complete

          4. Identify the EXACT file and line(s) causing the error and fix them:
             - Make ONLY minimal changes to fix the specific error
             - Keep all other code EXACTLY as is

          5. Call `save_file` for the fixed file(s) only

             CRITICAL: The 'content' parameter MUST be the complete fixed code for each file.
             DO NOT call save_file with empty arguments.
             DO NOT save incomplete code.

          6. Output: "Bug fixed: [one-line description]." followed by the list of files modified.

          COMMON GO/EBITENGINE FIXES (minimal changes only):
          - Import errors: Add missing import or remove unused import
          - Type mismatch: Add type conversion (float32, float64, int, etc.)
          - Undefined variable: Add declaration or fix typo
          - Missing method: Implement the missing interface method
          - Unused variable: Use _ or remove the variable

          FORBIDDEN ACTIONS:
          - DO NOT regenerate or rewrite code
          - DO NOT add comments like "... rest of code ..."
          - DO NOT simplify or optimize code
          - DO NOT save if file is incomplete

          IMPORTANT OUTPUT RULES:
          - You MUST generate the complete fixed Go code internally
          - Pass code as a STRING to save_file's 'content' parameter
          - DO NOT paste the code in your chat message text
          - Only output a brief fix description in your message, NO code blocks
        tooling:
          - type: function
            config:
              auto_load: true
              tools:
                - name: read_text_file_snippet
                - name: save_file
                - name: describe_available_files
    - id: QA_Agent
      type: agent
      context_window: 6
      config:
        provider: openai
        name: claude
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        params: {protocol: chat}
        role: |-
          You are a GAME QUALITY ASSURANCE SPECIALIST for Go/Ebitengine games.
          Perform final comprehensive review of the game code before building.

          DESIGN DOCUMENTS:
          Read the design documents to understand what the game should do:
          1. Call `read_text_file_snippet` with path="docs/gdd.md" for the Game Design Document
          2. Call `read_text_file_snippet` with path="docs/scenario.md" for the scenario
          3. Call `read_text_file_snippet` with path="docs/plan.md" for the implementation plan

          CRITICAL FIRST STEP:
          1. Call `describe_available_files` to find all source files
          2. Read every .go file using `read_text_file_snippet` (offset=0, limit=25000 each)
          3. If truncated=true, read more with increasing offset until complete

          REVIEW CHECKLIST:

          A. FUNCTIONAL COMPLETENESS
             - [ ] All features from GDD are implemented
             - [ ] Win condition works and is clear to player
             - [ ] Lose condition works and is clear
             - [ ] Controls are responsive (using ebiten.IsKeyPressed or inpututil)
             - [ ] No missing game mechanics

          B. VISUAL QUALITY
             - [ ] Background is NOT pure black (0,0,0,255)
             - [ ] Color palette is cohesive (using color.RGBA consistently)
             - [ ] UI is readable (ebitenutil.DebugPrint or text/v2)
             - [ ] Animations are smooth
             - [ ] Visual effects enhance gameplay

          C. USER EXPERIENCE
             - [ ] Game is fun/engaging
             - [ ] Difficulty is appropriate
             - [ ] Feedback is clear (scores, states, etc.)
             - [ ] Game over states are obvious
             - [ ] No confusion about objectives

          D. TECHNICAL REQUIREMENTS
             - [ ] R key restarts the game
             - [ ] Game struct implements ebiten.Game interface (Update, Draw, Layout)
             - [ ] No goroutine leaks
             - [ ] Proper error handling (errors returned from Update, log.Fatal in main)
             - [ ] No hardcoded magic numbers (use constants)
             - [ ] Code compiles (no obvious type errors or missing imports)

          DECISION LOGIC:
          - ALL items in A, B, D must pass
          - At least 80% of C must pass

          OUTPUT FORMAT:
          Analysis: <Brief evaluation summary>

          [If all checks pass]
          Decision: APPROVE

          [If issues found]
          Decision: NEEDS_REFINEMENT

          Issues Found:
          1. [Category] [Specific problem with line number if applicable]
          2. ...

          Improvement Suggestions:
          - [Actionable fix 1]
          - [Actionable fix 2]
        tooling:
          - type: function
            config:
              auto_load: true
              tools:
                - name: read_text_file_snippet
                - name: describe_available_files
    - id: Polish_Refinement
      type: agent
      context_window: 6
      config:
        provider: openai
        name: claude
        base_url: ${BASE_URL}
        api_key: ${API_KEY}
        params: {protocol: chat}
        role: |-
          You are a GAME IMPROVEMENT SPECIALIST for Go/Ebitengine games.
          Fix specific issues identified by QA_Agent without breaking existing functionality.

          DESIGN DOCUMENTS:
          Read the design documents for context on intended behavior:
          1. Call `read_text_file_snippet` with path="docs/gdd.md" for the Game Design Document
          2. Call `read_text_file_snippet` with path="docs/scenario.md" for the scenario
          3. Call `read_text_file_snippet` with path="docs/plan.md" for the implementation plan

          PROCESS:
          1. Read QA feedback (lists specific issues)

          2. Call `describe_available_files` to list all source files, then read every .go file completely:
             - Call `read_text_file_snippet` for each file (offset=0, limit=25000)
             - If truncated=true, read more with increasing offset until complete
             - Store all code in memory

          3. Fix ONLY the identified issues:
             - If color issue: adjust palette using color.RGBA
             - If animation issue: add/improve effects
             - If UI issue: redesign layout/text
             - If functional issue: add missing feature
             - Verify ALL other code remains unchanged

          4. Call `save_file` for each modified file

             CRITICAL: The 'content' parameter MUST be the complete code for each file.
             DO NOT call save_file with empty arguments.

          5. Output: "Refinement complete. Issues addressed: [list]." followed by the list of files modified.

          IMPORTANT OUTPUT RULES:
          - You MUST generate the complete refined Go code internally
          - Pass code as a STRING to save_file's 'content' parameter
          - DO NOT paste the code in your chat message text
          - Only output a brief summary, NO code blocks

          CONSTRAINTS:
          - Make MINIMAL changes (only fix what QA mentioned)
          - Do NOT rewrite the game
          - Preserve all existing functionality
          - Do NOT simplify or optimize unrelated code
        tooling:
          - type: function
            config:
              auto_load: true
              tools:
                - name: read_text_file_snippet
                - name: save_file
                - name: describe_available_files
  edges:
    # === Design Critique Loop ===
    - from: Game Designer
      to: Design_Critic
      trigger: true
      carry_data: true
    - from: Design_Critic
      to: Game Designer
      condition:
        type: keyword
        config:
          any:
            - DESIGN_NEEDS_WORK
      carry_data: true
    - from: Design_Critic
      to: Scenario_Builder
      condition:
        type: keyword
        config:
          any:
            - DESIGN_APPROVED
      carry_data: false
    # === Scenario Builder Loop ===
    - from: Scenario_Builder
      to: Scenario_Critic
      trigger: true
      carry_data: true
    - from: Scenario_Critic
      to: Scenario_Builder
      condition:
        type: keyword
        config:
          any:
            - SCENARIO_NEEDS_WORK
      carry_data: true
    - from: Scenario_Critic
      to: Planner
      condition:
        type: keyword
        config:
          any:
            - SCENARIO_APPROVED
      carry_data: false
    # === Art Pipeline ===
    - from: Planner
      to: Art_Director
      trigger: true
      carry_data: true
      keep_message: true
    - from: Art_Director
      to: Art_Generator
      trigger: true
      carry_data: true
    - from: Art_Generator
      to: Art_Critic
      trigger: true
      carry_data: true
    - from: Art_Critic
      to: Art_Refiner
      condition:
        type: keyword
        config:
          any:
            - ART_NEEDS_REVISION
      carry_data: true
    - from: Art_Critic
      to: Core_Developer
      condition:
        type: keyword
        config:
          any:
            - ART_APPROVED
      carry_data: false
    - from: Art_Refiner
      to: Art_Critic
      trigger: true
      carry_data: true
    # === Development Pipeline ===
    - from: Core_Developer
      to: Polish_Developer
      trigger: true
      carry_data: true
    - from: Polish_Developer
      to: QA_Agent
      trigger: true
      carry_data: true
    - from: QA_Agent
      to: Polish_Refinement
      condition:
        type: keyword
        config:
          any:
            - NEEDS_REFINEMENT
      carry_data: true
    - from: QA_Agent
      to: Game_Launcher
      condition:
        type: keyword
        config:
          any:
            - APPROVE
      carry_data: false
    - from: Polish_Refinement
      to: Game_Launcher
      trigger: true
      carry_data: false
    - from: Game_Launcher
      to: WASM_Builder
      trigger: true
      carry_data: true
    - from: WASM_Builder
      to: Bug_Fixer
      condition: code_fail
      carry_data: true
    - from: Bug_Fixer
      to: Game_Launcher
      trigger: true
      carry_data: false
  initial_instruction: Describe a game idea — even a vague vibe or a weird "what if?" is enough (e.g., 'A game where your shadow is your enemy', 'Cooking but everything is alive and fighting back', 'You control gravity, not the player'). The system will twist your idea into something original, craft a rich humorous scenario, generate art assets with AI, implement in Go with Ebitengine, add visual polish, perform QA, and compile to WebAssembly for browser play.
  start:
    - Game Designer
  end:
    - WASM_Builder
version: 1.0.0
vars: {}
