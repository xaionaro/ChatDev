  edges:
    # === Design Review (Human-in-the-loop) ===
    - from: Game Designer
      to: Design_Review
      trigger: true
      carry_data: true
    - from: Design_Review
      to: Game Designer
      trigger: true
      condition:
        type: keyword
        config:
          any: []
          none:
            - APPROVE
          regex: []
          case_sensitive: false
      carry_data: true
    - from: Design_Review
      to: Scenario_Builder
      trigger: false
      condition:
        type: keyword
        config:
          any:
            - APPROVE
          none: []
          regex: []
          case_sensitive: false
      carry_data: true
    # === Scenario Builder Loop ===
    - from: Scenario_Builder
      to: Scenario_Critic
      trigger: true
      carry_data: true
    - from: Scenario_Critic
      to: Scenario_Builder
      condition:
        type: keyword
        config:
          any:
            - SCENARIO_NEEDS_WORK
      carry_data: true
    - from: Scenario_Critic
      to: Planner
      condition:
        type: keyword
        config:
          any:
            - SCENARIO_APPROVED
      carry_data: true
    # === Art Pipeline ===
    - from: Planner
      to: Art_Director
      trigger: true
      carry_data: true
      keep_message: true
    - from: Art_Director
      to: Art_Generator
      trigger: true
      carry_data: true
    - from: Art_Generator
      to: Art_Critic
      trigger: true
      carry_data: true
    - from: Art_Critic
      to: Art_Refiner
      condition:
        type: keyword
        config:
          any:
            - ART_NEEDS_REVISION
      carry_data: true
    - from: Art_Critic
      to: Core_Developer
      condition:
        type: keyword
        config:
          any:
            - ART_APPROVED
      carry_data: true
    - from: Art_Refiner
      to: Art_Critic
      trigger: true
      carry_data: true
    # === Development Pipeline (unchanged) ===
    - from: Core_Developer
      to: Polish_Developer
      trigger: true
      carry_data: true
    - from: Polish_Developer
      to: QA_Agent
      trigger: true
      carry_data: true
    - from: QA_Agent
      to: Polish_Refinement
      condition:
        type: keyword
        config:
          any:
            - NEEDS_REFINEMENT
      carry_data: true
    - from: QA_Agent
      to: Game_Launcher
      condition:
        type: keyword
        config:
          any:
            - APPROVE
      carry_data: false
    - from: Polish_Refinement
      to: Game_Launcher
      trigger: true
      carry_data: false
    - from: Game_Launcher
      to: WASM_Builder
      trigger: true
      carry_data: true
    - from: WASM_Builder
      to: Bug_Fixer
      condition: code_fail
      carry_data: true
    - from: Bug_Fixer
      to: Game_Launcher
      trigger: true
      carry_data: false
  initial_instruction: Describe a game idea — even a vague vibe or a weird "what if?" is enough (e.g., 'A game where your shadow is your enemy', 'Cooking but everything is alive and fighting back', 'You control gravity, not the player'). The system will twist your idea into something original, craft a rich humorous scenario, generate pixel art assets with AI, implement in Go with Ebitengine, add visual polish, perform QA, and compile to WebAssembly for browser play.
  start:
    - Game Designer
  end:
    - WASM_Builder
version: 1.0.0
