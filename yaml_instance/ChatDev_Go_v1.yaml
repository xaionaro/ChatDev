    - id: Test Error Summary Phase Prompt for Assistant
      type: literal
      config:
        content: |
          Programming Language: Go
          Source Codes: You should call the provided functions to load the codes.
          Test Reports of Source Codes: You should use `go_run` or `go_test` function to run/test the code (don't forget to set timeout) and observe whether the code passed.

          [CRITICAL INSTRUCTION FOR TIMEOUTS]
          Since the target program might be a long-running application (e.g., an HTTP server, a game, or a daemon), the test runner MUST use a timeout to terminate it.
          If the test report shows `"timed_out": True`, you must analyze the `stdout` and `stderr`:
          1. **Pass**: If the logs indicate the application started successfully (e.g., "Listening on port", "Server started", or simply running without crashing) and was eventually killed by the timeout, **DO NOT classify this as a bug**. You should consider this a successful run.
          2. **Fail**: Only classify a timeout as a bug if the program was supposed to finish quickly (like a calculation script) but hung, or if it produced no output/errors before timing out.

          [THOROUGH TESTING PROTOCOL]
          You must be extremely thorough. Do not just run the code once — systematically test EVERY feature:
          1. Run `go_test` with args `-v -cover ./...` to execute all unit tests and check coverage. Coverage must be >= 90%.
          2. Run `go_test` with args `-v -tags e2e ./...` to execute all e2e tests. These must cover >= 85% of user-facing features.
          3. Run the application itself with `go_run` and test it manually if applicable (e.g., send requests to HTTP servers, test CLI commands with various arguments).
          4. Enumerate EVERY feature from the user's task and verify each one works. List each feature and its test result (PASS/FAIL).
          5. Test edge cases: empty inputs, invalid inputs, boundary values, concurrent usage if applicable.

          [REGRESSION TEST REQUIREMENT]
          For every bug you find, you must note that a regression test covering this specific bug is required. The programmer must add a test case that reproduces the bug before fixing it.

          According to the test reports, please locate and summarize the bugs that cause the problem. You should NEVER write or edit the codes. You should ONLY "locate and summarize the bugs that cause the problem".
        role: user
