    - id: Coding Phase Prompt for Assistant
      type: literal
      config:
        content: |-
          According to the new user's task and our software designs listed below:
          Modality: Code.
          Programming Language: Go.
          Task: Please refer to the input from user.
          We have decided to complete the task through an executable software implemented in Go. As the Programmer, to satisfy the new user's demands, you should write one or multiple .go files and make sure that every detail of the architecture is, in the end, implemented as code.
          Think step by step and reason yourself to the right decisions to make sure we get it right.
          You will first lay out the names of the core packages, types, functions, and methods that will be necessary, as well as a quick comment on their purpose.
          Then you will call the functions provided to firstly initialize a Go module (using init_go_module), and then add any required dependencies (using go_get). After that, you should implement the code and call the functions to save the .go files.
          Follow Go conventions:
          - Use a main package with a main() function as the entry point
          - Handle errors explicitly (check and return errors, use fmt.Errorf for wrapping)
          - Use proper package structure
          - Add Go doc comments to exported types and functions

          Example main.go:

          // Package main is the entry point for the application.
          package main

          import "fmt"

          func main() {
              fmt.Println("Hello, world!")
          }

          Please note that the code should be fully functional. Ensure to implement all functions. No placeholder implementations.
          You should call the provided functions to save your code.

          [PLACEHOLDER ASSET DIMENSIONS]
          When creating placeholder assets (images, sprites, icons, UI elements, textures, etc.), you MUST carefully choose appropriate width and height for each asset based on what it needs to visually express. Consider:
          - What content the asset represents (e.g., a character sprite needs enough pixels for recognizable limbs/features; an icon needs to be legible at its display size; a background needs to cover the intended viewport).
          - The context where the asset will be displayed (window size, layout position, scaling).
          - Aspect ratio appropriate for the content (e.g., a banner is wide, a portrait is tall, a tile is square).
          - Minimum resolution needed for the visual information to be readable/recognizable.
          Do NOT use arbitrary or uniform sizes for all placeholders. Each placeholder must have dimensions tailored to its specific purpose.

          [MANDATORY AUTO-TEST REQUIREMENT]
          You MUST write automated tests alongside your implementation code. Tests are NOT optional — they are a core deliverable, just like the implementation itself. For every `.go` source file you create, you must also create the corresponding `*_test.go` file in the same package.

          ## Unit Tests (required: >= 90% line coverage)
          - Create `*_test.go` files for every `.go` file (for `main.go`, extract testable logic into separate functions or internal packages and test those).
          - Test all exported AND unexported functions and methods.
          - Cover normal paths, edge cases, error paths, and boundary conditions.
          - Use table-driven tests with `t.Run()` subtests (idiomatic Go).
          - Use `t.Helper()` in test helper functions.
          - Mock external dependencies (network, filesystem, databases) using interfaces.
          - Every error return path must have a test case.

          ## End-to-End Tests (required: >= 85% coverage of user-facing features)
          - Create `e2e_test.go` files with build tag `//go:build e2e` so they can be run separately.
          - Test the application as a whole: start it, interact with it, verify outputs.
          - For CLI apps: test command-line arguments, stdin/stdout, exit codes.
          - For HTTP servers: use `net/http/httptest` to test endpoints end-to-end.
          - For libraries: test the public API with realistic usage scenarios.
          - Cover at least 85% of user-facing features described in the task.

          ## Coverage Verification
          After writing code and tests, you MUST run:
          1. `go_test` with args `-v -cover ./...` to verify unit test coverage >= 90%.
          2. `go_test` with args `-v -tags e2e -cover ./...` to verify e2e tests pass.
          If coverage is below the thresholds, add more tests before finishing.
        role: user
      description: ''
      context_window: 0
