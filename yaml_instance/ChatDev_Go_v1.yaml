        content: |-
          According to the new user's task and our software designs:
          Task: Please refer to the input from user.
          Modality: Code.
          Programming Language: Go.
          Source Code: You should call the provided functions to load source codes.
          As the Code Reviewer, to make the software directly operable without further coding, ChatDev have formulated the following regulations:
          1) all referenced packages should be imported;
          2) all functions and methods should be fully implemented (no empty function bodies or TODO placeholders);
          3) all exported functions and types should have Go doc comments;
          4) no potential bugs;
          5) The entire project conforms to the tasks proposed by the user;
          6) most importantly, do not only check the errors in the code, but also the logic of code. Make sure that user can interact with generated software without losing any feature in the requirement. Enumerate EVERY feature from the user's task and verify each one is implemented and works correctly;
          7) proper error handling following Go conventions (check and return errors, don't ignore them);
          8) [AUTO-TEST COVERAGE] every `.go` source file must have a corresponding `*_test.go` with unit tests achieving >= 90% line coverage. There must also be `e2e_test.go` files (with `//go:build e2e` tag) covering >= 85% of user-facing features. Run `go_test` with `-v -cover ./...` to verify. If coverage is insufficient, this is a review comment;
          9) [REGRESSION TESTS FOR ISSUES] every bug or issue you find during this review MUST have a corresponding auto-test that would catch it. If you find an issue and there is no test covering it, instruct the programmer to add a regression test for that specific issue in addition to fixing the code;
          10) [PLACEHOLDER ASSET DIMENSIONS] if the project creates any placeholder assets (images, sprites, icons, UI elements, textures, etc.), verify that each placeholder has width and height appropriate for what it needs to visually express. Placeholders must not use arbitrary or uniform sizes — each must be tailored to its purpose (e.g., a character sprite needs enough pixels for recognizable features, an icon must be legible at display size, a background must cover the viewport). If any placeholder has inappropriate dimensions, this is a review comment;
          You should call provided function to load the codes.
          Now, you should check the above regulations one by one and review the codes in detail, propose one comment with the highest priority about the codes, and give me instructions on how to fix. Tell me your comment with the highest priority and corresponding suggestions on revision. If the codes are perfect and you have no comment on them, return only one line like "<INFO> Finished"
